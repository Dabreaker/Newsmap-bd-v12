<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0d0f14">
<title>জনবার্তা — নাগরিক সংবাদ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Noto+Serif+Bengali:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --bg:      #0d0f14;
  --bg2:     #141720;
  --bg3:     #1c2030;
  --glass:   rgba(20,23,32,0.92);
  --border:  rgba(255,255,255,0.07);
  --text:    #e8ecf5;
  --muted:   #6b7594;
  --accent:  #4c7bff;
  --green:   #00d496;
  --red:     #ff4b6e;
  --gold:    #f5c842;
  --orange:  #ff7b3d;
  --radius:  14px;
  --shadow:  0 8px 32px rgba(0,0,0,0.5);
}
[data-theme="light"] {
  --bg:      #f0f2f8;
  --bg2:     #ffffff;
  --bg3:     #e8ebf5;
  --glass:   rgba(255,255,255,0.95);
  --border:  rgba(0,0,0,0.08);
  --text:    #0d0f14;
  --muted:   #6b7594;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans Bengali',sans-serif;background:var(--bg);color:var(--text);font-size:15px}

/* ── SHELL ── */
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative;overflow:hidden}

/* ── HEADER ── */
#header{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:100}
#header-logo{font-family:'Noto Serif Bengali',serif;font-size:20px;font-weight:700;color:var(--accent);letter-spacing:-0.5px;flex:1}
#header-logo span{color:var(--gold)}
.hdr-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 11px;font-size:12px;cursor:pointer;transition:.2s;font-family:inherit}
.hdr-btn:hover{color:var(--text);border-color:var(--accent)}
#notif-btn{position:relative}
#notif-dot{position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;background:var(--red);display:none;border:2px solid var(--bg2)}

/* ── SCREEN AREA ── */
#screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;-webkit-overflow-scrolling:touch}
.screen.active{display:block}

/* ── HOME ── */
#home-scroll{padding:12px 12px 80px}
.quran-card{background:linear-gradient(135deg,rgba(76,123,255,0.15),rgba(0,212,150,0.08));border:1px solid rgba(76,123,255,0.25);border-radius:var(--radius);padding:16px;margin-bottom:14px;position:relative;overflow:hidden}
.quran-card::before{content:'\201C';position:absolute;top:-8px;left:12px;font-size:80px;color:rgba(76,123,255,0.12);font-family:Georgia,serif;line-height:1}
.quran-arabic{font-size:16px;text-align:right;line-height:1.8;color:var(--gold);margin-bottom:8px;font-weight:600}
.quran-bn{font-size:13px;line-height:1.6;color:var(--text);margin-bottom:4px}
.quran-ref{font-size:11px;color:var(--muted);text-align:right}
.hero-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;cursor:pointer;transition:.2s}
.hero-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.hero-img{width:100%;height:200px;object-fit:cover;display:block}
.hero-img-placeholder{width:100%;height:200px;background:linear-gradient(135deg,var(--bg3),var(--bg2));display:flex;align-items:center;justify-content:center;font-size:40px}
.hero-body{padding:14px}
.score-bar-wrap{background:var(--bg3);border-radius:6px;height:5px;overflow:hidden;margin-bottom:10px}
.score-bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--green),var(--accent));transition:.4s}
.card-title{font-size:16px;font-weight:700;line-height:1.4;margin-bottom:6px}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.chip.real{background:rgba(0,212,150,0.12);color:var(--green)}
.chip.fake{background:rgba(255,75,110,0.12);color:var(--red)}
.chip.warn{background:rgba(245,200,66,0.12);color:var(--gold)}
.chip.dist-far{background:rgba(255,75,110,0.12);color:var(--red)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mini-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:.2s}
.mini-card:hover{border-color:var(--accent)}
.mini-thumb{width:100%;height:110px;object-fit:cover}
.mini-thumb-ph{width:100%;height:110px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:24px}
.mini-body{padding:10px}
.mini-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.list-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px;cursor:pointer;transition:.2s;display:flex;gap:10px}
.list-card:hover{border-color:var(--accent)}
.list-thumb{width:72px;height:72px;border-radius:8px;object-fit:cover;flex-shrink:0}
.list-thumb-ph{width:72px;height:72px;border-radius:8px;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
.list-body{flex:1;min-width:0}
.list-title{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.section-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px;margin-bottom:10px;text-transform:uppercase}
.donate-section{background:linear-gradient(135deg,rgba(245,200,66,0.08),rgba(76,123,255,0.06));border:1px solid rgba(245,200,66,0.2);border-radius:var(--radius);padding:16px;margin-top:16px}
.donate-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.donate-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.donate-row:last-child{border-bottom:none}
.donate-logo{font-size:20px;width:32px;text-align:center}
.donate-info{flex:1}
.donate-name{font-size:12px;color:var(--muted);margin-bottom:2px}
.donate-num{font-size:14px;font-weight:600;font-family:'JetBrains Mono',monospace}
.copy-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;transition:.2s;font-family:inherit;flex-shrink:0}
.copy-btn:hover{color:var(--gold);border-color:var(--gold)}

/* ── MAP TAB ── */
#map-screen{position:relative}
#map{position:absolute;inset:0;z-index:1}
#map-panel{position:absolute;bottom:0;left:0;right:0;z-index:10;background:var(--glass);backdrop-filter:blur(20px);border-top:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;max-height:70%;overflow-y:auto;transition:.3s;transform:translateY(100%)}
#map-panel.open{transform:translateY(0)}
#map-panel-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 14px;cursor:pointer}
#map-fab{position:absolute;right:16px;bottom:16px;z-index:11;background:var(--accent);color:#fff;border:none;border-radius:50%;width:52px;height:52px;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(76,123,255,0.4);transition:.2s;display:flex;align-items:center;justify-content:center}
#map-fab:hover{transform:scale(1.05)}
#map-locate{position:absolute;right:16px;bottom:80px;z-index:11;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.leaflet-container{background:#1a1f2e}

/* ── EXPLORE ── */
#explore-inner{padding:12px 12px 80px}
#search-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;width:100%;font-size:14px;color:var(--text);outline:none;transition:.2s;font-family:inherit;margin-bottom:14px}
#search-box:focus{border-color:var(--accent)}
#search-box::placeholder{color:var(--muted)}

/* ── NOTIFICATIONS ── */
#notif-inner{padding:12px 12px 80px}
.notif-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px;cursor:pointer;transition:.2s;display:flex;gap:10px;align-items:flex-start}
.notif-item:hover{border-color:var(--accent)}
.notif-item.unseen{border-color:rgba(76,123,255,0.3);background:rgba(76,123,255,0.05)}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.notif-dot.seen{background:var(--bg3)}
.notif-body{flex:1}
.notif-title{font-size:13px;font-weight:600;margin-bottom:4px}
.notif-meta{font-size:11px;color:var(--muted)}
.mark-read-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;width:100%;margin-bottom:14px;transition:.2s;font-family:inherit}
.mark-read-btn:hover{color:var(--text)}

/* ── USER / ACCOUNT ── */
#user-inner{padding:16px 12px 80px}
.user-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--green));display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px}
.user-name{text-align:center;font-size:18px;font-weight:700;margin-bottom:4px}
.user-sub{text-align:center;font-size:12px;color:var(--muted);margin-bottom:20px;font-family:'JetBrains Mono',monospace}
.action-btn{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;width:100%;text-align:left;color:var(--text);cursor:pointer;font-size:14px;margin-bottom:10px;transition:.2s;font-family:inherit}
.action-btn:hover{border-color:var(--accent);background:rgba(76,123,255,0.05)}
.action-btn.danger{color:var(--red)}
.action-btn.danger:hover{border-color:var(--red);background:rgba(255,75,110,0.05)}
.action-icon{font-size:18px;width:28px;text-align:center}
.login-prompt{text-align:center;padding:32px 16px}
.login-prompt-icon{font-size:48px;margin-bottom:16px}
.login-prompt h3{font-size:18px;font-weight:700;margin-bottom:8px}
.login-prompt p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px 24px;font-size:15px;cursor:pointer;width:100%;font-weight:600;transition:.2s;font-family:inherit}
.btn-primary:hover{background:#5d8aff;transform:translateY(-1px)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:13px 24px;font-size:15px;cursor:pointer;width:100%;font-weight:600;transition:.2s;font-family:inherit;margin-top:8px}
.btn-secondary:hover{border-color:var(--accent)}

/* ── BOTTOM NAV ── */
#nav{flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:0 0 env(safe-area-inset-bottom,0)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;cursor:pointer;transition:.2s;position:relative;border:none;background:none;color:var(--muted);font-family:'Noto Sans Bengali',sans-serif}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:20px;margin-bottom:2px;position:relative}
.nav-label{font-size:10px}
.nav-notif-dot{position:absolute;top:-2px;right:-2px;width:7px;height:7px;border-radius:50%;background:var(--red);display:none;border:2px solid var(--bg2)}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:480px;margin:0 auto;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;cursor:pointer}
.sheet-header{padding:16px 20px 0;display:flex;align-items:center;gap:10px}
.sheet-title{font-size:17px;font-weight:700;flex:1}
.sheet-close{background:var(--bg3);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--muted);flex-shrink:0}
.sheet-body{padding:16px 20px 24px}

/* News Detail */
.detail-images{position:relative;margin-bottom:16px}
.detail-img-scroll{display:flex;gap:8px;overflow-x:auto;scroll-snap-type:x mandatory;border-radius:var(--radius);scrollbar-width:none}
.detail-img-scroll::-webkit-scrollbar{display:none}
.detail-img-scroll img{width:100%;flex-shrink:0;scroll-snap-align:start;border-radius:var(--radius);max-height:240px;object-fit:cover}
.img-count-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.6);color:#fff;border-radius:20px;padding:3px 10px;font-size:11px;font-family:'JetBrains Mono',monospace}
.expiry-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(255,123,61,0.12);color:var(--orange);border-radius:20px;padding:4px 12px;font-size:12px;margin-bottom:10px}
.detail-title{font-size:18px;font-weight:700;line-height:1.4;margin-bottom:10px}
.detail-desc{font-size:14px;line-height:1.7;color:var(--text);margin-bottom:14px;white-space:pre-wrap}
.truth-section{background:var(--bg3);border-radius:12px;padding:14px;margin-bottom:14px}
.truth-label{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between}
.truth-bar{background:var(--bg2);border-radius:6px;height:8px;overflow:hidden;margin-bottom:10px}
.truth-fill{height:100%;border-radius:6px;transition:.4s;background:linear-gradient(90deg,var(--red),var(--green))}
.vote-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.vote-btn{border:2px solid var(--border);border-radius:10px;padding:11px;font-size:14px;cursor:pointer;background:transparent;color:var(--text);font-weight:600;transition:.2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.vote-btn:hover:not(:disabled){transform:translateY(-1px)}
.vote-btn.real:hover:not(:disabled),.vote-btn.real.active{border-color:var(--green);background:rgba(0,212,150,0.1);color:var(--green)}
.vote-btn.fake:hover:not(:disabled),.vote-btn.fake.active{border-color:var(--red);background:rgba(255,75,110,0.1);color:var(--red)}
.vote-btn:disabled{opacity:.4;cursor:not-allowed}
.vote-hint{font-size:11px;color:var(--muted);text-align:center;margin-top:8px}
.detail-actions{display:flex;gap:8px;margin-bottom:14px}
.det-act-btn{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;font-size:12px;color:var(--muted);cursor:pointer;transition:.2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}
.det-act-btn:hover{color:var(--text);border-color:var(--accent)}
.det-act-btn.saved{color:var(--gold);border-color:var(--gold)}
.det-act-btn.delete{color:var(--red)}
.det-act-btn.delete:hover{border-color:var(--red);background:rgba(255,75,110,0.08)}
.links-section{font-size:13px;color:var(--muted);margin-bottom:12px;word-break:break-all;line-height:1.7}
.links-section a{color:var(--accent);text-decoration:none}
.coord-section{background:var(--bg3);border-radius:10px;padding:10px 14px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted);line-height:1.8}

/* ── REPORT SHEET ── */
#report-map-wrap{height:220px;border-radius:12px;overflow:hidden;margin-bottom:14px;position:relative;border:1px solid var(--border)}
#report-map{height:100%}
#report-pin-status{position:absolute;bottom:8px;left:8px;right:8px;background:rgba(0,0,0,0.7);color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;text-align:center;pointer-events:none;backdrop-filter:blur(4px)}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:block;font-weight:600}
.form-input{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;width:100%;font-size:14px;color:var(--text);outline:none;transition:.2s;font-family:inherit;resize:vertical}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--muted)}
.char-count{font-size:11px;color:var(--muted);text-align:right;margin-top:4px}
.img-upload-area{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:.2s;color:var(--muted)}
.img-upload-area:hover{border-color:var(--accent);color:var(--text)}
.img-preview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.img-preview-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden}
.img-preview-item img{width:100%;height:100%;object-fit:cover}
.img-remove{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── AUTH SHEET ── */
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:20px}
.auth-tab{background:transparent;border:none;color:var(--muted);border-radius:8px;padding:10px;font-size:14px;cursor:pointer;transition:.2s;font-family:inherit;font-weight:600}
.auth-tab.active{background:var(--bg2);color:var(--text)}
.form-error{background:rgba(255,75,110,0.1);border:1px solid rgba(255,75,110,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:none}
.form-error.show{display:block}

/* ── ADMIN ── */
.admin-tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto}
.admin-tab{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap;transition:.2s;font-family:inherit}
.admin-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg3);border-radius:12px;padding:14px;text-align:center}
.stat-num{font-size:28px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.admin-row{background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.admin-row-info{flex:1;min-width:0}
.admin-row-title{font-size:13px;font-weight:600;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.admin-row-sub{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.small-btn{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--muted);cursor:pointer;transition:.2s;font-family:inherit;flex-shrink:0}
.small-btn:hover{color:var(--text)}
.small-btn.danger{color:var(--red)}
.small-btn.danger:hover{border-color:var(--red)}
.small-btn.warn{color:var(--gold)}
.small-btn.warn:hover{border-color:var(--gold)}
.pagination{display:flex;justify-content:center;gap:8px;margin-top:14px}
.page-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;color:var(--muted);transition:.2s;font-family:inherit}
.page-btn:hover{color:var(--text)}
.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── TOAST ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;z-index:999;opacity:0;pointer-events:none;transition:.3s;max-width:320px;text-align:center;box-shadow:var(--shadow);white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.error{border-color:rgba(255,75,110,0.5);color:var(--red)}

/* ── SPINNER ── */
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:20px auto;display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state-icon{font-size:40px;margin-bottom:12px;display:block}
.empty-state p{font-size:14px;line-height:1.6}

/* ── LEAFLET CUSTOM ── */
.news-marker-icon{background:var(--accent);border:2px solid rgba(255,255,255,0.3);border-radius:50% 50% 50% 0;width:20px;height:20px;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(76,123,255,0.5)}
.news-marker-icon.high-real{background:var(--green)}
.news-marker-icon.high-fake{background:var(--red)}
.user-marker{background:var(--gold);border:3px solid #fff;border-radius:50%;width:16px;height:16px;box-shadow:0 2px 8px rgba(245,200,66,0.6)}

/* ── LOADER OVERLAY ── */
#loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:.3s}
#loader.hidden{opacity:0;pointer-events:none}
.loader-logo{font-family:'Noto Serif Bengali',serif;font-size:36px;font-weight:700;color:var(--accent);margin-bottom:8px}
.loader-logo span{color:var(--gold)}
.loader-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.loader-bar{width:120px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.loader-bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;animation:loadBar 1.2s ease forwards}
@keyframes loadBar{to{width:100%}}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── MISC ── */
.sep{height:1px;background:var(--border);margin:12px 0}
.flex-center{display:flex;align-items:center;justify-content:center}
.mt8{margin-top:8px}
.mt16{margin-top:16px}
.text-muted{color:var(--muted)}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-gold{color:var(--gold)}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-logo">জন<span>বার্তা</span></div>
  <div class="loader-sub">নাগরিক সংবাদ মানচিত্র</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<!-- APP SHELL -->
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div id="header-logo">জন<span>বার্তা</span></div>
    <button class="hdr-btn" id="lang-btn">EN</button>
    <button class="hdr-btn" id="theme-btn">☀️</button>
    <button class="hdr-btn" id="notif-btn">🔔<span id="notif-dot"></span></button>
  </div>

  <!-- SCREENS -->
  <div id="screens">

    <!-- HOME -->
    <div class="screen active" id="screen-home">
      <div id="home-scroll">
        <div id="quran-card-wrap"></div>
        <div id="home-content"><div class="spinner"></div></div>
        <div class="donate-section" id="donate-home">
          <div class="donate-title">💚 সহায়তা করুন</div>
          <div class="donate-row">
            <div class="donate-logo">🌸</div>
            <div class="donate-info">
              <div class="donate-name">bKash</div>
              <div class="donate-num">01700000000</div>
            </div>
            <button class="copy-btn" onclick="copyNum('01700000000')">কপি</button>
          </div>
          <div class="donate-row">
            <div class="donate-logo">🟠</div>
            <div class="donate-info">
              <div class="donate-name">Nagad</div>
              <div class="donate-num">01700000001</div>
            </div>
            <button class="copy-btn" onclick="copyNum('01700000001')">কপি</button>
          </div>
          <div class="donate-row">
            <div class="donate-logo">🔵</div>
            <div class="donate-info">
              <div class="donate-name">Rocket</div>
              <div class="donate-num">01700000002</div>
            </div>
            <button class="copy-btn" onclick="copyNum('01700000002')">কপি</button>
          </div>
        </div>
      </div>
    </div>

    <!-- MAP -->
    <div class="screen" id="screen-map">
      <div id="map-screen">
        <div id="map"></div>
        <button id="map-locate" onclick="mapLocate()" title="আমার অবস্থান">📍</button>
        <button id="map-fab" onclick="openReport()" title="রিপোর্ট করুন">＋</button>
        <div id="map-panel">
          <div id="map-panel-handle" onclick="closeMapPanel()"></div>
          <div id="map-panel-content" style="padding:0 16px 20px"></div>
        </div>
      </div>
    </div>

    <!-- EXPLORE -->
    <div class="screen" id="screen-explore">
      <div id="explore-inner">
        <input type="search" id="search-box" placeholder="শিরোনাম বা বিবরণ খুঁজুন…" oninput="filterExplore(this.value)">
        <div id="explore-list"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- NOTIFICATIONS -->
    <div class="screen" id="screen-notif">
      <div id="notif-inner">
        <button class="mark-read-btn" onclick="markAllRead()" data-i18n="markRead">সব পড়া চিহ্নিত করুন</button>
        <div id="notif-list"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- USER -->
    <div class="screen" id="screen-user">
      <div id="user-inner">
        <div id="user-content"></div>
      </div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div id="nav">
    <button class="nav-item active" data-tab="home" onclick="switchTab('home')">
      <span class="nav-icon">🏠</span>
      <span class="nav-label" data-i18n="home">হোম</span>
    </button>
    <button class="nav-item" data-tab="map" onclick="switchTab('map')">
      <span class="nav-icon">🗺️</span>
      <span class="nav-label" data-i18n="map">মানচিত্র</span>
    </button>
    <button class="nav-item" data-tab="explore" onclick="switchTab('explore')">
      <span class="nav-icon">🔍</span>
      <span class="nav-label" data-i18n="explore">অন্বেষণ</span>
    </button>
    <button class="nav-item" data-tab="notif" onclick="switchTab('notif')">
      <span class="nav-icon">🔔<span class="nav-notif-dot" id="nav-notif-dot"></span></span>
      <span class="nav-label" data-i18n="notifs">বিজ্ঞপ্তি</span>
    </button>
    <button class="nav-item" data-tab="user" onclick="switchTab('user')">
      <span class="nav-icon">👤</span>
      <span class="nav-label" data-i18n="account">অ্যাকাউন্ট</span>
    </button>
  </div>

</div>

<!-- ══════════ OVERLAYS ══════════ -->

<!-- AUTH SHEET -->
<div class="overlay" id="auth-overlay" onclick="closeAuth(event)">
  <div class="sheet" id="auth-sheet">
    <div class="sheet-handle" onclick="closeOverlay('auth-overlay')"></div>
    <div class="sheet-header">
      <span class="sheet-title" id="auth-title" data-i18n="login">লগইন</span>
      <button class="sheet-close" onclick="closeOverlay('auth-overlay')">✕</button>
    </div>
    <div class="sheet-body">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchAuth('login')" data-i18n="login">লগইন</button>
        <button class="auth-tab" id="tab-register" onclick="switchAuth('register')" data-i18n="register">নিবন্ধন</button>
      </div>
      <div class="form-error" id="auth-error"></div>
      <div class="form-group">
        <label class="form-label" data-i18n="phone">ফোন নম্বর</label>
        <input type="tel" class="form-input" id="auth-phone" placeholder="01XXXXXXXXX">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="password">পাসওয়ার্ড</label>
        <input type="password" class="form-input" id="auth-pass" placeholder="কমপক্ষে ৬ অক্ষর">
      </div>
      <button class="btn-primary" id="auth-submit" onclick="doAuth()">লগইন করুন</button>
    </div>
  </div>
</div>

<!-- NEWS DETAIL MODAL -->
<div class="overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="sheet" id="detail-sheet" style="max-height:95vh">
    <div class="sheet-handle" onclick="closeOverlay('detail-overlay')"></div>
    <div class="sheet-header">
      <span class="sheet-title">সংবাদ বিস্তারিত</span>
      <button class="sheet-close" onclick="closeOverlay('detail-overlay')">✕</button>
    </div>
    <div class="sheet-body" id="detail-body"></div>
  </div>
</div>

<!-- REPORT SHEET -->
<div class="overlay" id="report-overlay" onclick="closeReport(event)">
  <div class="sheet" id="report-sheet" style="max-height:95vh">
    <div class="sheet-handle" onclick="closeOverlay('report-overlay')"></div>
    <div class="sheet-header">
      <span class="sheet-title" data-i18n="reportNews">সংবাদ রিপোর্ট করুন</span>
      <button class="sheet-close" onclick="closeOverlay('report-overlay')">✕</button>
    </div>
    <div class="sheet-body">
      <div id="report-map-wrap">
        <div id="report-map"></div>
        <div id="report-pin-status">অবস্থান লোড হচ্ছে…</div>
      </div>
      <div class="form-error" id="report-error"></div>
      <div class="form-group">
        <label class="form-label" data-i18n="title">শিরোনাম <span style="color:var(--red)">*</span></label>
        <input type="text" class="form-input" id="rep-title" maxlength="120" placeholder="সংবাদের শিরোনাম লিখুন">
        <div class="char-count"><span id="rep-title-count">0</span>/120</div>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="description">বিবরণ</label>
        <textarea class="form-input" id="rep-desc" maxlength="1000" rows="4" placeholder="বিস্তারিত বিবরণ লিখুন…"></textarea>
        <div class="char-count"><span id="rep-desc-count">0</span>/1000</div>
      </div>
      <div class="form-group">
        <label class="form-label">উৎস লিংক</label>
        <input type="text" class="form-input" id="rep-links" placeholder="https://...">
      </div>
      <div class="form-group">
        <label class="form-label">ছবি (সর্বোচ্চ ১০টি)</label>
        <div class="img-upload-area" onclick="document.getElementById('rep-imgs').click()">
          <div style="font-size:24px;margin-bottom:6px">📷</div>
          <div style="font-size:13px">ছবি যোগ করতে ট্যাপ করুন</div>
        </div>
        <input type="file" id="rep-imgs" accept="image/*" multiple style="display:none" onchange="handleImgSelect(this)">
        <div class="img-preview-grid" id="img-preview-grid"></div>
      </div>
      <button class="btn-primary" id="rep-submit" onclick="submitReport()">📤 রিপোর্ট পাঠান</button>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="overlay" id="admin-overlay" onclick="closeAdmin(event)">
  <div class="sheet" style="max-height:95vh">
    <div class="sheet-handle" onclick="closeOverlay('admin-overlay')"></div>
    <div class="sheet-header">
      <span class="sheet-title">⚙️ অ্যাডমিন প্যানেল</span>
      <button class="sheet-close" onclick="closeOverlay('admin-overlay')">✕</button>
    </div>
    <div class="sheet-body">
      <div class="admin-tabs">
        <button class="admin-tab active" id="adm-tab-stats" onclick="switchAdminTab('stats')">পরিসংখ্যান</button>
        <button class="admin-tab" id="adm-tab-news" onclick="switchAdminTab('news')">সংবাদ</button>
        <button class="admin-tab" id="adm-tab-users" onclick="switchAdminTab('users')">ব্যবহারকারী</button>
      </div>
      <div id="admin-content"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- MY REPORTS -->
<div class="overlay" id="myreports-overlay" onclick="closeMyReports(event)">
  <div class="sheet" style="max-height:95vh">
    <div class="sheet-handle" onclick="closeOverlay('myreports-overlay')"></div>
    <div class="sheet-header">
      <span class="sheet-title" data-i18n="myReports">আমার রিপোর্ট</span>
      <button class="sheet-close" onclick="closeOverlay('myreports-overlay')">✕</button>
    </div>
    <div class="sheet-body" id="myreports-body"><div class="spinner"></div></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
